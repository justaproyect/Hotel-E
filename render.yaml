services:
  - type: web
    name: hermes-agent
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:prod
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hermes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: hermes-redis
          type: redis
          property: connectionString
      - key: OLLAMA_URL
        value: http://hermes-ollama:11434
      - key: JWT_SECRET
        generateValue: true

  - type: worker
    name: hermes-ollama
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.ollama
    envVars:
      - key: OLLAMA_HOST
        value: 0.0.0.0
      - key: OLLAMA_MODEL
        value: llama3.2

  - type: redis
    name: hermes-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: hermes-db
    region: oregon
    plan: free
    databaseName: hermes
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
